<!DOCTYPE html>
<html>
<head>
<title>KLN College Login</title>
<style>
  body { display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial; background:#f2f2f2; }
  .box { background:#fff; padding:30px; border-radius:10px; text-align:center; box-shadow:0 4px 10px #0003; }
  img { width:80px; }
  input { display:block; width:200px; margin:10px auto; padding:8px; }
  button { padding:8px 20px; background:#003366; color:#fff; border:none; border-radius:5px; }
</style>
</head>
<body>
  <div class="box">
    <img src="logo.png">
    <h3>KLN College of Engineering</h3>
    <form onsubmit="alert('Login: '+username.value); return false;">
      <input id="username" placeholder="Username" required>
      <input id="password" type="password" placeholder="Password" required>
      <button>Login</button>
    </form>
  </div>
</body>
</html>
