<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KLN College Login</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .login-box {
    background: #fff;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
  }
  .login-box img {
    width: 80px;
    margin-bottom: 10px;
  }
  .login-box h2 {
    margin: 10px 0 20px;
    color: #333;
  }
  .login-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
  }
  .login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #003366;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
  }
  .login-box button:hover {
    background: #00509e;
  }
</style>
</head>
